# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.

# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.
title:
email: alfredthedev@gmail.com
description: >- # this means to ignore newlines until "baseurl:"
Software Developer & Tech Enthusiast. Explore insightful articles, coding tutorials, and software reviews.
Discover the latest trends in technology and gain valuable knowledge from a passionate developer.
twitter_username: alfredwamugi
github_username: alfredwamugi
minimal_mistakes_skin: contrast
logo: "/assets/images/logo.png"
search: true

# Build settings
markdown: kramdown
remote_theme: mmistakes/minimal-mistakes
# Outputting
permalink: /:categories/:title/
paginate: 4 # amount of posts to show
paginate_path: /page:num/
timezone: # https://en.wikipedia.org/wiki/List_of_tz_database_time_zones

include:
  - _pages

# Exclude from processing.
# The following items will not be processed, by default. Create a custom list
# to override the default setting.
# exclude:
#   - Gemfile
#   - Gemfile.lock
#   - node_modules
#   - vendor/bundle/
#   - vendor/cache/
#   - vendor/gems/
#   - vendor/ruby/

# Plugins (previously gems:)
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

author:
  name   : "Alfred Wamugi"
  avatar : "/assets/images/bio-photo.png"
  bio    : "Software Developer & Reviewer. Explore. Create. Inspire. Passionate about tech, building innovative solutions, and sharing insights."
  links:
    - label: "Website"
      icon: "fa fa-link"
      url: "https://alfredwamugi.github.io/"
    - label: "Twitter"
      icon: "fa fa-twitter"
      url: "https://twitter.com/wamugialfred"
    - label: "GitHub"
      icon: "fa fa-github"
      url: "https://github.com/alfredwamugi"
    - label: "Instagram"
      icon: "fa fa-instagram"
      url: "https://instagram.com/wamugialfred"

footer:
  links:
    - label: "Twitter"
      icon: "fa fa-twitter"
      url: "https://twitter.com/wamugialfred"
    - label: "GitHub"
      icon: "fa fa-github"
      url: "https://github.com/alfredwamugi"
    - label: "Instagram"
      icon: "fa fa-instagram"
      url: "https://instagram.com/wamugialfred"

defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
  # _pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/
